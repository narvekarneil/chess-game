name: Build Executables

on:
  push:
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygame python-chess pyinstaller

      - name: Make macOS Stockfish binaries executable
        if: runner.os == 'macOS'
        run: |
          chmod +x engines/macos/stockfish-macos-arm64
          chmod +x engines/macos/stockfish-macos-x86-64

      - name: Build Windows app
        if: runner.os == 'Windows'
        run: >
          pyinstaller --noconfirm --clean --windowed
          --name RheaChess
          --add-data "assets;assets"
          --add-data "stockfish.exe;."
          --collect-submodules chess
          --collect-submodules pygame
          game.py

      - name: Build macOS app
        if: runner.os == 'macOS'
        run: >
          pyinstaller --noconfirm --clean --windowed
          --name RheaChess
          --add-data "assets:assets"
          --add-data "engines/macos:engines/macos"
          --collect-submodules chess
          --collect-submodules pygame
          game.py

      - name: Make macOS app friendlier
        if: runner.os == 'macOS'
        run: |
          chmod +x dist/RheaChess.app/Contents/MacOS/RheaChess
          find dist/RheaChess.app -name "stockfish*" -exec chmod +x {} \;
          xattr -cr dist/RheaChess.app || true
          codesign --force --deep --sign - dist/RheaChess.app || true

      - name: Build macOS debug app
        if: runner.os == 'macOS'
        run: >
          pyinstaller --noconfirm --clean
          --name RheaChessDebug
          --add-data "assets:assets"
          --add-data "engines/macos:engines/macos"
          --collect-submodules chess
          --collect-submodules pygame
          game.py

      - name: Add macOS debug launcher
        if: runner.os == 'macOS'
        run: |
          cat > dist/RheaChessDebug/Open-RheaChess-Debug.command <<'EOF'
          #!/bin/bash
          cd "$(dirname "$0")"
          xattr -dr com.apple.quarantine . 2>/dev/null || true
          chmod +x ./RheaChessDebug 2>/dev/null || true
          find . -name "stockfish*" -exec chmod +x {} \; 2>/dev/null || true
          ./RheaChessDebug
          echo
          echo "If the game crashed, copy the error above and send it to Neil/Codex."
          read -n 1 -s -r -p "Press any key to close..."
          EOF
          chmod +x dist/RheaChessDebug/Open-RheaChess-Debug.command
          find dist/RheaChessDebug -name "stockfish*" -exec chmod +x {} \;

      - name: Archive Windows build
        if: runner.os == 'Windows'
        shell: powershell
        run: Compress-Archive -Path dist\RheaChess\* -DestinationPath dist\RheaChess-windows.zip -Force

      - name: Archive macOS build
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent dist/RheaChess.app dist/RheaChess-macos.zip

      - name: Archive macOS debug build
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent dist/RheaChessDebug dist/RheaChess-macos-debug.zip

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: RheaChess-windows
          path: dist/RheaChess-windows.zip

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: RheaChess-macos
          path: dist/RheaChess-macos.zip

      - name: Upload macOS debug artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: RheaChess-macos-debug
          path: dist/RheaChess-macos-debug.zip
